version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tms_db
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: tms_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tms-network

  redis:
    image: redis:7-alpine
    container_name: tms-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - tms-network

volumes:
  pgdata:
  redisdata:

networks:
  tms-network:
    driver: bridge
